services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: truepb_live
      POSTGRES_USER: truepb
      POSTGRES_PASSWORD: truepb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truepb -d truepb_live"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build: .
    environment:
      DATABASE_URL: postgresql://truepb:truepb@db:5432/truepb_live
      PORT: 8000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - ./imports:/imports:ro

volumes:
  postgres-data:
